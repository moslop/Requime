<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avril-Shop | المتجر الرسمي</title>
    <meta name="description" content="Avril-Shop هو متجر إلكتروني يقدم تشكيلة راقية من المنتجات المختارة بعناية. جودة عالية، أسعار تنافسية،افريل شوب ,الربيع , تفتح ,  وخدمة توصيل سريعة.">  
    <!-- مكتبات واجهة المستخدم (React & Tailwind) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- مكاتب Firebase متوافقة مع Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #fcfcfc; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #E3A1B3; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-800 selection:bg-pink-100">
    
    <div id="root"></div>

    <script type="text/babel">
      // 1. إعدادات قاعدة البيانات الخاصة بك
      const firebaseConfig = {
        apiKey: "AIzaSyB7Tl3X5QJAAPMKHAgUOVb5A97DKD8mxbk",
        authDomain: "ange-d-avril.firebaseapp.com",
        databaseURL: "https://ange-d-avril-default-rtdb.firebaseio.com",
        projectId: "ange-d-avril",
        storageBucket: "ange-d-avril.firebasestorage.app",
        messagingSenderId: "128914074220",
        appId: "1:128914074220:web:6d8352b76055a0e5d1c649"
      };

      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.database();

      const SECRET_CODE = "CNSy7zbs";
      const WHATSAPP_NUMBER = "213655295217";
      // تم إضافة رابط حسابك الفعلي هنا
      const INSTAGRAM_LINK = "https://www.instagram.com/righi_001?igsh=aDBteWdqOGx0MzB1";

      function App() {
        // إدارة حالة الموقع
        const [activeTab, setActiveTab] = React.useState('home');
        const [products, setProducts] = React.useState([]);
        const [loading, setLoading] = React.useState(true);
        
        // الإدارة
        const [isAdmin, setIsAdmin] = React.useState(false);
        const [showLoginModal, setShowLoginModal] = React.useState(false);
        const [passwordInput, setPasswordInput] = React.useState('');
        const [isAdding, setIsAdding] = React.useState(false);
        const [editingId, setEditingId] = React.useState(null);
        const [adminForm, setAdminForm] = React.useState({ name: '', price: '', oldPrice: '', isSale: false, quantity: '', category: '', images: [] });
        
        // الشراء
        const [checkoutProduct, setCheckoutProduct] = React.useState(null);
        const [customerForm, setCustomerForm] = React.useState({ name: '', phone: '', address: '' });
        
        // نظام الدخول السري (10 ضغطات)
        const [logoClicks, setLogoClicks] = React.useState(0);
        const clickTimeout = React.useRef(null);

        // جلب البيانات من Firebase
        React.useEffect(() => {
          auth.signInAnonymously().catch(error => console.error("Auth Error:", error));
          const productsRef = db.ref('products');
          productsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const prods = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).sort((a, b) => b.createdAt - a.createdAt) : [];
            setProducts(prods);
            setLoading(false);
          });
          return () => productsRef.off();
        }, []);

        // دوال الإدارة وتسجيل الدخول
        const handleLogoClick = () => {
          if (isAdmin) return;
          setLogoClicks(prev => prev + 1);
          if (clickTimeout.current) clearTimeout(clickTimeout.current);
          clickTimeout.current = setTimeout(() => setLogoClicks(0), 2000);
        };

        React.useEffect(() => {
          if (logoClicks >= 10) { setShowLoginModal(true); setLogoClicks(0); clearTimeout(clickTimeout.current); }
        }, [logoClicks]);

        const handleAdminLogin = () => {
          if (passwordInput === SECRET_CODE) { setIsAdmin(true); setShowLoginModal(false); setPasswordInput(''); setActiveTab('products'); }
          else { alert('الرمز السري خاطئ!'); }
        };

        // دوال إضافة وحذف المنتجات
        const handleImageUpload = (e) => {
          const files = Array.from(e.target.files);
          files.forEach(file => {
            const reader = new FileReader();
            reader.onloadend = () => setAdminForm(prev => ({ ...prev, images: [...prev.images, reader.result] }));
            reader.readAsDataURL(file);
          });
        };

        const handleSaveProduct = async () => {
          if (!adminForm.name || !adminForm.price) return alert('يرجى ملء الاسم والسعر!');
          const productData = { ...adminForm, price: Number(adminForm.price), quantity: Number(adminForm.quantity || 1), createdAt: Date.now() };
          try {
            if (editingId) await db.ref(`products/${editingId}`).update(productData);
            else await db.ref('products').push(productData);
            setIsAdding(false); setEditingId(null); setAdminForm({ name: '', price: '', oldPrice: '', isSale: false, quantity: '', category: '', images: [] });
          } catch (err) { alert(err.message); }
        };

        const handleDelete = async (id) => {
          if (window.confirm('تأكيد الحذف؟')) await db.ref(`products/${id}`).remove();
        };

        // الشراء عبر واتساب
        const submitOrder = (e) => {
          e.preventDefault();
          const message = `*طلب جديد من Avril-Shop* 🛍️\n\n*المنتج:* ${checkoutProduct.name}\n*السعر:* ${checkoutProduct.price} د.ج\n\n*الزبون:* ${customerForm.name}\n*الهاتف:* ${customerForm.phone}\n*العنوان:* ${customerForm.address}\n`;
          window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
          setCheckoutProduct(null);
        };

        return (
          <div className="min-h-screen flex flex-col relative">
            
            {/* Header / Nav */}
            <nav className="bg-white/90 backdrop-blur-md sticky top-0 z-40 shadow-sm border-b border-pink-50">
              <div className="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
                
                {/* Logo */}
                <div onClick={handleLogoClick} className="cursor-pointer select-none">
                    <h1 className="text-3xl font-extrabold text-[#E3A1B3] tracking-wider">Avril-Shop</h1>
                </div>

                {/* Menu */}
                <div className="flex gap-6 items-center">
                    <button onClick={() => setActiveTab('home')} className={`text-lg font-bold transition ${activeTab === 'home' ? 'text-[#E3A1B3] border-b-2 border-[#E3A1B3]' : 'text-gray-500 hover:text-pink-300'}`}>الرئيسية</button>
                    <button onClick={() => setActiveTab('products')} className={`text-lg font-bold transition ${activeTab === 'products' ? 'text-[#E3A1B3] border-b-2 border-[#E3A1B3]' : 'text-gray-500 hover:text-pink-300'}`}>المنتجات</button>
                    
                    {isAdmin && (
                        <button onClick={() => setIsAdmin(false)} className="bg-red-50 text-red-500 px-3 py-1 rounded-full text-xs font-bold mr-4">خروج الإدارة</button>
                    )}
                </div>
              </div>
            </nav>

            {/* Main Content Area */}
            <main className="flex-grow max-w-6xl mx-auto w-full p-4 sm:p-6">
                
                {/* ======= الصفحة الرئيسية ======= */}
                {activeTab === 'home' && (
                    <div className="animate-in flex flex-col items-center text-center mt-10 md:mt-20 px-4">
                        <div className="w-24 h-24 bg-pink-100 text-[#E3A1B3] rounded-full flex items-center justify-center text-4xl mb-6 shadow-inner">
                            <i className="fa-solid fa-gem"></i>
                        </div>
                        <h2 className="text-4xl md:text-6xl font-black text-gray-800 mb-6 leading-tight">
                            مرحباً بك في عالم <br/> <span className="text-[#E3A1B3]">Avril-Shop</span>
                        </h2>
                        <p className="text-gray-500 text-lg md:text-xl mb-10 max-w-2xl">
                            نقدم لك تشكيلة راقية ومختارة بعناية من أفضل المنتجات. جودة عالية، أسعار تنافسية، وخدمة توصيل سريعة حتى باب منزلك.
                        </p>
                        <button onClick={() => setActiveTab('products')} className="bg-[#E3A1B3] text-white px-10 py-4 rounded-full font-bold text-xl hover:bg-pink-400 hover:shadow-lg hover:-translate-y-1 transition duration-300">
                            تصفح المتجر الآن <i className="fa-solid fa-arrow-left mr-2"></i>
                        </button>
                    </div>
                )}

                {/* ======= صفحة المنتجات ======= */}
                {activeTab === 'products' && (
                    <div className="animate-in">
                        
                        {/* لوحة تحكم الأدمن (تظهر فقط للإدارة) */}
                        {isAdmin && (
                            <div className="bg-pink-50 p-6 rounded-3xl mb-8 border border-pink-100 shadow-sm">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-xl text-gray-700">لوحة التحكم</h3>
                                    <button onClick={() => setIsAdding(!isAdding)} className="bg-[#E3A1B3] text-white px-4 py-2 rounded-full text-sm font-bold shadow">
                                        {isAdding ? 'إلغاء' : '+ إضافة منتج جديد'}
                                    </button>
                                </div>
                                
                                {isAdding && (
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-pink-100 mt-4 grid grid-cols-1 md:grid-cols-2 gap-6 animate-in">
                                        <div className="space-y-4">
                                            <input type="text" placeholder="اسم المنتج" value={adminForm.name} onChange={e => setAdminForm({...adminForm, name: e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 ring-pink-200 font-bold" />
                                            <input type="text" placeholder="الصنف (مثال: ساعات)" value={adminForm.category} onChange={e => setAdminForm({...adminForm, category: e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 ring-pink-200 font-bold" />
                                            <div className="flex gap-4">
                                                <input type="number" placeholder="السعر" value={adminForm.price} onChange={e => setAdminForm({...adminForm, price: e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 ring-pink-200 font-bold" />
                                                <input type="number" placeholder="الكمية" value={adminForm.quantity} onChange={e => setAdminForm({...adminForm, quantity: e.target.value})} className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 ring-pink-200 font-bold" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="border-2 border-dashed border-pink-200 p-8 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-pink-50 transition">
                                                <input type="file" multiple accept="image/*" onChange={handleImageUpload} className="hidden" />
                                                <i className="fa-solid fa-cloud-arrow-up text-3xl text-pink-300 mb-2"></i>
                                                <span className="font-bold text-gray-500">ارفع صور المنتج</span>
                                            </label>
                                            {adminForm.images.length > 0 && <p className="text-xs text-green-500 mt-2 font-bold">تم رفع {adminForm.images.length} صور</p>}
                                            <button onClick={handleSaveProduct} className="w-full bg-green-500 text-white font-bold py-3 rounded-xl mt-4 hover:bg-green-600 transition">حفظ المنتج</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* شبكة عرض المنتجات */}
                        {loading ? (
                            <div className="flex justify-center py-20"><div className="w-10 h-10 border-4 border-pink-100 border-t-[#E3A1B3] rounded-full animate-spin"></div></div>
                        ) : products.length === 0 ? (
                            <div className="text-center py-20 text-xl text-gray-400 font-bold">لا توجد منتجات حالياً.</div>
                        ) : (
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                                {products.map(p => (
                                    <div key={p.id} className="bg-white rounded-3xl p-3 shadow-sm hover:shadow-xl transition duration-300 border border-gray-100 group flex flex-col relative overflow-hidden">
                                        {/* صورة المنتج */}
                                        <div className="relative aspect-[4/5] rounded-2xl overflow-hidden mb-4 bg-gray-50">
                                            {p.category && <span className="absolute top-2 right-2 bg-white/90 text-gray-800 text-[10px] font-bold px-2 py-1 rounded-md z-10 shadow-sm">{p.category}</span>}
                                            <img src={p.images?.[0]} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" alt={p.name} />
                                            
                                            {/* أزرار الإدارة فوق الصورة */}
                                            {isAdmin && (
                                                <div className="absolute bottom-2 left-2 flex gap-2 z-10">
                                                    <button onClick={() => { setAdminForm(p); setEditingId(p.id); setIsAdding(true); window.scrollTo(0,0); }} className="bg-white/90 p-2 rounded-full text-blue-500 shadow"><i className="fa-solid fa-pen"></i></button>
                                                    <button onClick={() => handleDelete(p.id)} className="bg-white/90 p-2 rounded-full text-red-500 shadow"><i className="fa-solid fa-trash"></i></button>
                                                </div>
                                            )}
                                        </div>
                                        
                                        {/* معلومات المنتج */}
                                        <h3 className="font-bold text-gray-800 text-sm md:text-base leading-tight mb-2 truncate">{p.name}</h3>
                                        <div className="flex justify-between items-center mt-auto">
                                            <p className="text-[#E3A1B3] font-black text-base md:text-lg">{p.price} د.ج</p>
                                        </div>

                                        {/* زر الطلب للمستخدم العادي */}
                                        {!isAdmin && (
                                            <button onClick={() => setCheckoutProduct(p)} className="w-full bg-gray-50 text-gray-800 hover:bg-[#E3A1B3] hover:text-white font-bold py-2 rounded-xl mt-3 transition duration-300 text-sm">
                                                طلب الآن
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                )}
            </main>

            {/* ======= الفوتر Footer ======= */}
            <footer className="bg-white py-8 border-t border-pink-50 mt-12 w-full">
                <div className="max-w-6xl mx-auto px-4 flex flex-col items-center justify-center">
                    <h2 className="text-2xl font-black text-gray-300 mb-2">Avril-Shop</h2>
                    <p className="text-gray-400 text-sm font-bold mb-4">كل الحقوق محفوظة © 2026</p>
                    
                    {/* قسم تصميم وتطوير مع زر إنستغرام الأنيق */}
                    <div className="flex items-center gap-2 bg-pink-50 px-6 py-2.5 rounded-full text-sm transition-all hover:shadow-md border border-pink-100/50">
                        <span className="text-gray-500 font-bold">تصميم وتطوير:</span>
                        
                        <a href={INSTAGRAM_LINK} target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 group cursor-pointer">
                            <span className="text-[#E3A1B3] font-black tracking-wide group-hover:text-pink-600 transition-colors duration-300">
                                Mustapha Righi
                            </span>
                            <i className="fa-brands fa-instagram text-base text-gray-400 group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-tr group-hover:from-yellow-400 group-hover:via-pink-500 group-hover:to-purple-600 transition-all duration-300 transform group-hover:scale-110"></i>
                        </a>
                    </div>
                </div>
            </footer>

            {/* ======= نوافذ منبثقة (Modals) ======= */}
            
            {/* 1. نافذة الدخول للإدارة */}
            {showLoginModal && (
              <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[60] flex items-center justify-center p-4 animate-in">
                <div className="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full text-center">
                  <i className="fa-solid fa-user-shield text-4xl text-[#E3A1B3] mb-4"></i>
                  <h3 className="font-bold text-xl mb-6 text-gray-800">تسجيل دخول الإدارة</h3>
                  <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-center text-xl tracking-widest mb-6 focus:border-[#E3A1B3] outline-none font-bold" placeholder="رمز المرور" />
                  <div className="flex gap-3">
                    <button onClick={() => setShowLoginModal(false)} className="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">إلغاء</button>
                    <button onClick={handleAdminLogin} className="flex-1 bg-[#E3A1B3] text-white font-bold rounded-xl shadow-md hover:bg-pink-400 transition">دخول</button>
                  </div>
                </div>
              </div>
            )}

            {/* 2. نافذة الطلب (Checkout) */}
            {checkoutProduct && (
                <div className="fixed inset-0 bg-white/95 backdrop-blur-md z-[70] flex items-center justify-center p-4 sm:p-0 animate-in">
                    <div className="bg-white sm:rounded-3xl shadow-2xl w-full sm:max-w-md h-full sm:h-auto flex flex-col overflow-hidden border border-pink-100">
                        <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                            <span className="font-black text-gray-700">إتمام الطلب</span>
                            <button onClick={() => setCheckoutProduct(null)} className="text-gray-400 hover:text-red-500 w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center transition"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="p-6 overflow-y-auto flex-1">
                            <div className="flex gap-4 mb-6 bg-pink-50/50 p-3 rounded-2xl border border-pink-100">
                                <img src={checkoutProduct.images?.[0]} className="w-20 h-20 object-cover rounded-xl shadow-sm" />
                                <div>
                                    <h4 className="font-bold text-gray-800 mb-1 leading-tight">{checkoutProduct.name}</h4>
                                    <p className="text-[#E3A1B3] font-black">{checkoutProduct.price} د.ج</p>
                                </div>
                            </div>
                            <form onSubmit={submitOrder} className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-500 mb-1 block">الاسم واللقب</label>
                                    <input type="text" required value={customerForm.name} onChange={e => setCustomerForm({...customerForm, name: e.target.value})} className="w-full bg-gray-50 p-4 rounded-xl outline-none focus:ring-2 ring-pink-200 font-bold" placeholder="اكتب اسمك الكامل هنا..." />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 mb-1 block">رقم الهاتف</label>
                                    <input type="tel" required value={customerForm.phone} onChange={e => setCustomerForm({...customerForm, phone: e.target.value})} className="w-full bg-gray-50 p-4 rounded-xl outline-none focus:ring-2 ring-pink-200 font-bold text-left" dir="ltr" placeholder="05XX XX XX XX" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 mb-1 block">عنوان التوصيل (الولاية، البلدية)</label>
                                    <textarea required value={customerForm.address} onChange={e => setCustomerForm({...customerForm, address: e.target.value})} className="w-full bg-gray-50 p-4 rounded-xl outline-none focus:ring-2 ring-pink-200 font-bold resize-none" rows="3" placeholder="اكتب عنوانك بالتفصيل..."></textarea>
                                </div>
                                <button type="submit" className="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-lg mt-4 shadow-lg shadow-green-500/30 hover:bg-green-600 hover:-translate-y-1 transition duration-300 flex items-center justify-center gap-2">
                                    تأكيد وإرسال عبر واتساب <i className="fa-brands fa-whatsapp text-xl"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
